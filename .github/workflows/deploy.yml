name: Publish module to PowerShell Gallery
on:
  push:
    tags:
      - v[0-9]*
jobs:
  on-success:
    name: Publish to PowerShell Gallery
    runs-on: windows-latest
    steps:
      - name: Check out script source
        uses: actions/checkout@v6
      - name: Build module
        id: build
        run: ./scripts/Build-Module.ps1
      - name: Create release
        id: release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Publish module
        id: publish
        env:
            GALLERYKEY: ${{ secrets.gallerykey }}
            MODULEVERSION: ${{ github.ref }}
        run: ./scripts/Publish-ThisModule.ps1
