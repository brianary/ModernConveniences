name: Continuous integration
on: push
defaults:
  run:
    shell: pwsh
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out script source
        uses: actions/checkout@v6
      - name: Build module
        id: build
        run: ./Build-Module.ps1
      - name: Analyze module style
        uses: microsoft/psscriptanalyzer-action@v1.0
        with:
          settings: PSGallery
          output: analysis.sarif
      - name: Test module
        id: test
        run: |
          Import-Module ./*.psd1
          Invoke-Pester -Configuration @{TestResult=@{Enabled=$true}}
